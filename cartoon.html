<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cartoon Animation</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    color: #fff;

    background: url("cartoon-bg.jpg") center/cover no-repeat;
    position: relative;
}

/* DARK CINEMATIC OVERLAY */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at top, rgba(0,0,0,0.4), rgba(0,0,0,0.95));
    z-index: 0;
}

header, .grid {
    position: relative;
    z-index: 1;
}

/* HEADER */
header {
    padding: 60px 20px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

header h1 {
    letter-spacing: 3px;
    font-size: 28px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
    padding: 40px;
    max-width: 1100px;
    margin: auto;
}

/* VIDEO CARD */
.card {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    background: #111;
    border: 1px solid rgba(255,255,255,0.08);
    transition: 0.4s ease;
    transform: translateY(0);
}

.card:hover {
    transform: translateY(-8px) scale(1.02);
    border-color: rgba(255,255,255,0.3);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

/* VIDEO */
.card video {
    width: 100%;
    height: 180px;
    object-fit: cover;
    display: block;
    filter: brightness(0.9);
}

/* TITLE */
.title {
    padding: 12px;
    font-size: 13px;
    text-align: center;
    color: #ccc;
}

/* HOVER EFFECT LABEL */
.play {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 14px;
    background: rgba(0,0,0,0.6);
    padding: 6px 10px;
    border-radius: 6px;
    opacity: 0;
    transition: 0.3s;
}

.card:hover .play {
    opacity: 1;
}

/* LIGHTBOX */
#lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

#lightbox video {
    width: 85%;
    max-height: 85%;
    border-radius: 10px;
    box-shadow: 0 0 60px rgba(255,255,255,0.05);
}

/* BACK BUTTON */
.back {
    display: inline-block;
    margin-top: 20px;
    color: #fff;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 10px 16px;
    border-radius: 8px;
}

.back:hover {
    border-color: #fff;
}

</style>

</head>

<body>

<header>
    <h1>CARTOON ANIMATION</h1>
    <a class="back" href="index.html">← Back to Home</a>
</header>

<section class="grid" id="gallery"></section>

<div id="lightbox" onclick="closeLightbox()">
    <video id="player" controls autoplay></video>
</div>

<script>

const videos = [
    {
        title: "Animation 1",
        src: "videos/animation1.mp4"
    },
    {
        title: "Animation 2",
        src: "videos/animation2.mp4"
    }
];

const gallery = document.getElementById("gallery");

videos.forEach(v => {

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <video src="${v.src}" muted></video>
        <div class="play">▶ Play</div>
        <div class="title">${v.title}</div>
    `;

    card.onclick = () => openVideo(v.src);

    gallery.appendChild(card);
});

function openVideo(src) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("player").src = src;
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
    document.getElementById("player").src = "";
}

</script>

</body>
</html>
