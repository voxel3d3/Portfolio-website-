<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Character Design</title>

<style>

body {
    font-family: Arial;
    color: #fff;

    background-image: url("character-bg.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-color: #000;

    min-height: 100vh;
    min-height: 100dvh; /* modern mobile fix */
}


body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;

    background: rgba(0,0,0,0.85);
    z-index: 0;

    animation: darkFade 1.2s ease forwards;
}

@keyframes darkFade {
    0% {
        opacity: 1;
    }
    100% {
        opacity: 0.85;
    }
}

html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #000;
}

header, .grid {
    position: relative;
    z-index: 1;

    opacity: 0;
    transform: scale(1.05) translateY(30px);
    filter: blur(10px);

    animation: appleIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    animation-delay: 0.2s;
}

@keyframes appleIn {
    0% {
        opacity: 0;
        transform: scale(1.05) translateY(30px);
        filter: blur(12px);
    }
    100% {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: blur(0);
    }
}

body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;

    /* DARK OVERLAY (KEY FIX) */
    background: rgba(0, 0, 0, 0.85);

    z-index: -1;
}

/* HEADER */
header {
    padding: 60px 20px;
    text-align: center;
    border-bottom: 1px solid #222;
}

h1 {
    margin: 0;
    letter-spacing: 2px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 40px;
    max-width: 1000px;
    margin: auto;
}

.card {
    background: #0f0f0f;
    border: 1px solid #222;
    padding: 20px;
    border-radius: 12px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px);
    border-color: #fff;
    box-shadow: 0 0 20px rgba(255,255,255,0.08);
}

/* BACK BUTTON */
.back {
    display: inline-block;
    margin-top: 20px;
    color: #fff;
    text-decoration: none;
    border: 1px solid #333;
    padding: 10px 16px;
    border-radius: 8px;
}

.back:hover {
    border-color: #fff;
}

@media (max-width: 768px) {
    body {
        min-height: 100dvh;
        background-attachment: scroll;
    }
}

</style>

</head>

<body>

<header>
    <h1>3D CHARACTER DESIGN</h1>
    <a class="back" href="index.html">← Back to Home</a>
</header>

<section class="grid">

    <div class="card">Character Project 1</div>
    <div class="card">Character Project 2</div>
    <div class="card">Character Project 3</div>
    <div class="card">Character Project 4</div>

</section>

</body>
</html>
