<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>3D Character Design</title>

<style>

body {
    font-family: Arial;
    color: #fff;

    background-image: url("character-bg.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-color: #000;

    min-height: 100vh;
    min-height: 100dvh; /* modern mobile fix */
}

body {
    font-family: Arial;
    color: #fff;

    background-image: url("character-bg.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    min-height: 100vh;
    margin: 0;
    position: relative;
}

/* DARK OVERLAY */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 0;
}

header, .grid {
    position: relative;
    z-index: 1;
}

@keyframes darkFade {
    0% {
        opacity: 1;
    }
    100% {
        opacity: 0.85;
    }
}

header, .grid {
    position: relative;
    z-index: 1;

    opacity: 0;
    transform: scale(1.05) translateY(30px);
    filter: blur(10px);

    animation: appleIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    animation-delay: 0.2s;
}

@keyframes appleIn {
    0% {
        opacity: 0;
        transform: scale(1.05) translateY(30px);
        filter: blur(12px);
    }
    100% {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: blur(0);
    }
}

/* HEADER */
header {
    padding: 60px 20px;
    text-align: center;
    border-bottom: 1px solid #222;
}

h1 {
    margin: 0;
    letter-spacing: 2px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 40px;
    max-width: 1000px;
    margin: auto;
}

#lightbox {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background: rgba(0,0,0,0.95);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

#lightbox img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
    box-shadow: 0 0 40px rgba(255,255,255,0.1);
}

.thumb {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 12px;
    border: 1px solid #222;
    cursor: pointer;
    transition: 0.3s ease;
}

.thumb:hover {
    transform: scale(1.03);
    border-color: #fff;
    box-shadow: 0 10px 30px rgba(255,255,255,0.08);
}

.card {
    background: #0f0f0f;
    border: 1px solid #222;
    padding: 20px;
    border-radius: 12px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-6px);
    border-color: #fff;
    box-shadow: 0 0 20px rgba(255,255,255,0.08);
}

/* BACK BUTTON */
.back {
    display: inline-block;
    margin-top: 20px;
    color: #fff;
    text-decoration: none;
    border: 1px solid #333;
    padding: 10px 16px;
    border-radius: 8px;
}

.back:hover {
    border-color: #fff;
}

@media (max-width: 768px) {
    body {
        min-height: 100dvh;
        background-attachment: scroll;
    }
}

</style>

</head>

<body>

<header>
    <h1>3D CHARACTER DESIGN</h1>
    <a class="back" href="index.html">← Back to Home</a>
</header>

<script>
const images = [
    "renders/render1.jpg",
    "renders/render2.jpg",
    "renders/render3.jpg",
    "renders/render4.jpg",
    "renders/render5.jpg"
];
</script>

<section class="grid" id="gallery"></section>

<div id="lightbox" onclick="closeLightbox()">
    <img id="lightbox-img">
</div>

<script>
const gallery = document.getElementById("gallery");

images.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    img.className = "thumb";
    img.onclick = () => openLightbox(src);
    gallery.appendChild(img);
});
</script>

<script>
function openLightbox(src) {
    document.getElementById("lightbox").style.display = "flex";
    document.getElementById("lightbox-img").src = src;
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}
</script>


</body>
</html>
