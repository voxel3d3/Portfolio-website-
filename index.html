<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VOXEL 3D Portfolio</title>

<style>

/* INTRO SCREEN */

.intro {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 99999;

    animation: fadeOut 1s ease forwards;
    animation-delay: 2.5s;
}

.icon {
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: flex-start;
}

/* LOGO ANIMATION */
.intro-logo {
    width: 140px;
    opacity: 0;
    transform: scale(0.7);
    animation: logoIn 1.5s ease forwards;
}

/* LOGO APPEAR */
@keyframes logoIn {
    0% {
        opacity: 0;
        transform: scale(0.7);
        filter: blur(10px);
    }
    100% {
        opacity: 1;
        transform: scale(1);
        filter: blur(0);
    }
}

/* SCREEN DISAPPEAR */
@keyframes fadeOut {
    to {
        opacity: 0;
        visibility: hidden;
    }
}

:root {
    --bg: #000;
    --panel: #0f0f0f;
    --text: #fff;
    --muted: #b5b5b5;
    --border: #222;
}

/* SMOOTH SCROLL */
html {
    scroll-behavior: smooth;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* HERO */

.hero {
    height: 100vh;
    background-image: url("hero.jpg");
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.contact {
    text-align: center;
    padding: 100px 20px;
}

.contact-title {
    margin-bottom: 40px;
    letter-spacing: 2px;
}

/* BUTTON WRAPPER */
.contact-buttons {
    display: flex;
    flex-direction: column;
    gap: 15px;
    max-width: 350px;
    margin: auto;
}

/* BASE BUTTON STYLE */
.btn {
    display: block;
    padding: 14px 18px;
    border-radius: 10px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    border: 1px solid #333;
    background: #0f0f0f;
    transition: 0.25s ease;
}

/* HOVER EFFECT */
.btn:hover {
    transform: translateY(-3px);
    border-color: white;
    box-shadow: 0 0 20px rgba(255,255,255,0.08);
}

/* EMAIL */
.btn.email {
    border-color: #555;
}

/* INSTAGRAM */
.btn.instagram {
    border-color: #888;
}

/* WHATSAPP */
.btn.whatsapp {
    border-color: #25D366;
}

.btn.whatsapp:hover {
    box-shadow: 0 0 20px rgba(37, 211, 102, 0.35);
}

/* DARK OVERLAY */
.hero::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.65);
}

.hero-content {
    position: relative;
    z-index: 2;
}

.logo {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 90px;
    z-index: 10;
    filter: invert(1); /* makes black logo visible on dark backgrounds */
    opacity: 0.9;
}

.hero-content h1 {
    font-size: 64px;
    letter-spacing: 5px;
    margin: 0;
}

.hero-content p {
    color: var(--muted);
}

/* SECTIONS */
.section {
    padding: 80px 20px;
    text-align: center;
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.8s ease;
}

/* when visible */
.section.show {
    opacity: 1;
    transform: translateY(0);
}

h2 {
    margin-bottom: 20px;
    letter-spacing: 2px;
}

/* SHOWREEL */
iframe {
    width: 100%;
    max-width: 900px;
    height: 500px;
    border-radius: 14px;
    box-shadow: 0 0 40px rgba(255,255,255,0.05);
}

/* PROJECT GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    max-width: 1000px;
    margin: auto;
}

.card {
    background: var(--panel);
    padding: 40px;
    border: 1px solid var(--border);
    border-radius: 12px;
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-10px);
    border-color: #fff;
    box-shadow: 0 0 30px rgba(255,255,255,0.08);
}

/* CONTACT */
.contact {
    color: var(--muted);
}

@media (max-width: 768px) {

    .hero {
        background-position: center top;
        height: 90vh;
    }

    .hero-content h1 {
        font-size: 38px;
    }

    .hero-content p {
        font-size: 14px;
        padding: 0 20px;
    }
}

</style>

</head>

<!-- ANIMATION SCRIPT -->
<script>
const sections = document.querySelectorAll('.section');

function showSections() {
    sections.forEach(sec => {
        const top = sec.getBoundingClientRect().top;
        const trigger = window.innerHeight * 0.85;

        if (top < trigger) {
            sec.classList.add('show');
        }
    });
}

window.addEventListener('scroll', showSections);
showSections();
</script>
